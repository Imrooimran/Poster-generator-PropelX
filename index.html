<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropelX — Speaker Poster Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: #EFF3F6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  .page {
    display: flex;
    gap: 48px;
    align-items: flex-start;
    max-width: 1180px;
    width: 100%;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── FORM ── */
  .form-panel {
    background: #fff;
    border-radius: 18px;
    padding: 32px 28px;
    width: 360px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    flex-shrink: 0;
  }
  .form-panel h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: #111; margin-bottom: 4px; }
  .form-panel > p { font-size: 13px; color: #888; margin-bottom: 24px; }
  .photo-row {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px; padding-bottom: 20px;
    border-bottom: 1px solid #eee;
  }
  .photo-thumb {
    width: 60px; height: 60px; border-radius: 10px;
    background: #EFF3F6; border: 2px dashed #00FF91;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0; cursor: pointer;
  }
  .photo-thumb img { width:100%; height:100%; object-fit:cover; border-radius:8px; }
  .photo-thumb svg { opacity:.4; }
  .plabel h3 { font-size: 13px; font-weight: 700; color: #111; margin-bottom: 2px; }
  .plabel p  { font-size: 11px; color: #aaa; margin-bottom: 6px; }
  .upload-btn {
    font-size: 12px; font-weight: 600; color: #007744;
    background: #f0fdf4; border: 1px solid #00FF91;
    border-radius: 6px; padding: 5px 12px; cursor: pointer; display: inline-block;
  }
  .upload-btn:hover { background: #e0fff0; }
  #photoInput { display: none; }
  .photo-adjust {
    margin-bottom: 20px; padding-bottom: 20px;
    border-bottom: 1px solid #eee;
    transition: opacity .15s;
  }
  .photo-adjust:not(.active) { opacity: .4; pointer-events: none; }
  .adjust-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .adjust-row label {
    flex: 0 0 74px; margin-bottom: 0; font-size: 10px;
    font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #555;
  }
  .adjust-row input[type="range"] { flex: 1; accent-color: #00cc74; }
  .adjust-row .val { flex: 0 0 36px; text-align: right; font-size: 11px; color: #888; }
  .adjust-hint { font-size: 11px; color: #aaa; margin-bottom: 8px; }
  .reset-link {
    font-size: 11px; font-weight: 600; color: #00aa66;
    background: none; border: none; cursor: pointer; padding: 0;
  }
  .reset-link:hover { text-decoration: underline; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .field { margin-bottom: 14px; }
  .field:last-of-type { margin-bottom: 0; }
  label {
    display: block; font-size: 10px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase; color: #555; margin-bottom: 5px;
  }
  input[type="text"] {
    width: 100%; padding: 10px 13px;
    border: 1.5px solid #e5e7eb; border-radius: 9px;
    font-family: 'Barlow', sans-serif; font-size: 14px; color: #111;
    background: #fafafa; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input[type="text"]:focus {
    border-color: #00FF91; box-shadow: 0 0 0 3px rgba(0,255,145,.15); background: #fff;
  }
  input[type="text"].error { border-color: #f87171; }
  .gen-btn {
    width: 100%; margin-top: 20px; padding: 13px;
    background: #00FF91; color: #0d1f14;
    font-family: 'Barlow', sans-serif; font-size: 15px; font-weight: 700;
    border: none; border-radius: 50px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .15s, transform .1s;
  }
  .gen-btn:hover { background: #00e080; transform: translateY(-1px); }
  .gen-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
  .toast {
    margin-top: 12px; background: #f0fdf4; border: 1px solid #00FF91;
    border-radius: 9px; padding: 11px 15px;
    display: none; align-items: center; gap: 9px;
    font-size: 13px; color: #007744; font-weight: 600;
  }
  .toast.show { display: flex; }

  /* ── PREVIEW ── */
  .preview-panel { flex: 1; min-width: 320px; max-width: 540px; }
  .preview-label {
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: #aaa; margin-bottom: 10px; text-align: center;
  }
  #previewWrap {
    width: 100%; border-radius: 16px; overflow: hidden;
    box-shadow: 0 16px 60px rgba(0,0,0,0.20);
  }
  #previewCanvas { width: 100%; height: auto; display: block; touch-action: none; }
  #posterCanvas  { display: none; }
</style>
</head>
<body>
<div class="page">

  <!-- FORM -->
  <div class="form-panel">
    <h2>Create your PropelX poster</h2>
    <p>Fill in your details — download &amp; share on LinkedIn</p>

    <div class="photo-row">
      <div class="photo-thumb" id="photoThumb" onclick="document.getElementById('photoInput').click()">
        <svg id="photoIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00aa66" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <img id="photoPreview" style="display:none" alt="">
      </div>
      <div class="plabel">
        <h3>Speaker photo</h3>
        <p>Recommended: square image</p>
        <label class="upload-btn" for="photoInput">Choose photo</label>
      </div>
      <input type="file" id="photoInput" accept="image/*">
    </div>

    <div class="photo-adjust" id="photoAdjust">
      <div class="adjust-hint">Drag the photo in the live preview to reposition it</div>
      <div class="adjust-row">
        <label for="photoZoom">Zoom</label>
        <input type="range" id="photoZoom" min="100" max="250" value="100" step="1">
        <span class="val" id="photoZoomVal">100%</span>
      </div>
      <div class="adjust-row">
        <label for="photoBrightness">Brightness</label>
        <input type="range" id="photoBrightness" min="50" max="150" value="100" step="1">
        <span class="val" id="photoBrightnessVal">100%</span>
      </div>
      <div class="adjust-row">
        <label for="photoContrast">Contrast</label>
        <input type="range" id="photoContrast" min="50" max="150" value="100" step="1">
        <span class="val" id="photoContrastVal">100%</span>
      </div>
      <button type="button" class="reset-link" id="photoReset">Reset adjustments</button>
    </div>

    <div class="row2">
      <div class="field" style="margin-bottom:0">
        <label for="firstName">First name *</label>
        <input type="text" id="firstName" placeholder="Alex">
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="lastName">Last name *</label>
        <input type="text" id="lastName" placeholder="Johnson">
      </div>
    </div>
    <div class="field">
      <label for="jobTitle">Job title *</label>
      <input type="text" id="jobTitle" placeholder="Global Director of Implementations">
    </div>
    <div class="field">
      <label for="company">Company *</label>
      <input type="text" id="company" placeholder="Acme Corp">
    </div>

    <button class="gen-btn" id="genBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
      </svg>
      Generate &amp; Download
    </button>
    <div class="toast" id="toast">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Poster downloaded! Share it on LinkedIn 🎉
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="preview-label">Live Preview</div>
    <div id="previewWrap">
      <canvas id="previewCanvas" width="1080" height="1080"></canvas>
    </div>
  </div>
</div>

<canvas id="posterCanvas" width="1080" height="1080"></canvas>

let photoDataUrl = null;
let photoImgEl = null; // cached decoded <img>/<canvas> for the uploaded photo, avoids re-decoding on every render
let photoT = { zoom: 1, offsetX: 0, offsetY: 0, brightness: 100, contrast: 100 };
let bgImg = null, logoImg = null, qrImg = null, sparkleImg = null;

// Photo box position/size on the 1080x1080 canvas — must mirror the photo box
// math in drawPoster's "CONTENT ROW" section below.
function getPhotoRect() {
  const M = 30, pillH = 198, row2H = 73, gapMain = 81;
  const contentY = M + (pillH + 40 + row2H) + gapMain;
  const contentH = 1080 - M - contentY;
  const colGap = 24, leftColW = 484, btnH = 84;
  return { x: M, y: contentY, w: leftColW, h: contentH - btnH - colGap };
}

// Clamps the stored pan offset so the (possibly zoomed) photo always fully
// covers its box — called after zoom changes and while dragging.
function clampPhotoOffset() {
  if (!photoImgEl) return;
  const r = getPhotoRect();
  const ia = photoImgEl.width / photoImgEl.height, ba = r.w / r.h;
  const baseW = ia > ba ? r.h * ia : r.w;
  const baseH = ia > ba ? r.h : r.w / ia;
  const dw = baseW * photoT.zoom, dh = baseH * photoT.zoom;
  const maxOffX = Math.max(0, (dw - r.w) / 2);
  const maxOffY = Math.max(0, (dh - r.h) / 2);
  photoT.offsetX = Math.min(maxOffX, Math.max(-maxOffX, photoT.offsetX));
  photoT.offsetY = Math.min(maxOffY, Math.max(-maxOffY, photoT.offsetY));
}

function loadImg(src) {
  return new Promise(res => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => res(null);
    i.src = src;
  });
}

async function preload() {
  [bgImg, logoImg, qrImg, sparkleImg] = await Promise.all([
    loadImg(BG_SRC), loadImg(LOGO_SRC), loadImg(QR_SRC), loadImg(SPARKLE_SRC),
    // canvas text doesn't wait for webfonts the way DOM text does — without this,
    // the very first render can silently draw with a fallback font.
    document.fonts.ready
  ]);
  renderPreview();
}

const photoAdjust = document.getElementById('photoAdjust');
const zoomEl = document.getElementById('photoZoom');
const brightEl = document.getElementById('photoBrightness');
const contrastEl = document.getElementById('photoContrast');
const zoomVal = document.getElementById('photoZoomVal');
const brightVal = document.getElementById('photoBrightnessVal');
const contrastVal = document.getElementById('photoContrastVal');

function resetPhotoAdjust() {
  photoT = { zoom: 1, offsetX: 0, offsetY: 0, brightness: 100, contrast: 100 };
  zoomEl.value = 100; brightEl.value = 100; contrastEl.value = 100;
  zoomVal.textContent = '100%'; brightVal.textContent = '100%'; contrastVal.textContent = '100%';
}

document.getElementById('photoInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    photoDataUrl = ev.target.result;
    photoImgEl = await loadImg(photoDataUrl);
    resetPhotoAdjust();
    photoAdjust.classList.add('active');
    document.getElementById('photoPreview').src = photoDataUrl;
    document.getElementById('photoPreview').style.display = 'block';
    document.getElementById('photoIcon').style.display = 'none';
    renderPreview();
  };
  reader.readAsDataURL(file);
});

zoomEl.addEventListener('input', () => {
  photoT.zoom = Number(zoomEl.value) / 100;
  zoomVal.textContent = zoomEl.value + '%';
  clampPhotoOffset();
  renderPreview();
});
brightEl.addEventListener('input', () => {
  photoT.brightness = Number(brightEl.value);
  brightVal.textContent = brightEl.value + '%';
  renderPreview();
});
contrastEl.addEventListener('input', () => {
  photoT.contrast = Number(contrastEl.value);
  contrastVal.textContent = contrastEl.value + '%';
  renderPreview();
});
document.getElementById('photoReset').addEventListener('click', () => {
  resetPhotoAdjust();
  renderPreview();
});

// ── Drag-to-reposition on the live preview ──
const previewCanvasEl = document.getElementById('previewCanvas');
let dragging = false, dragStart = null;

function canvasPoint(e) {
  const rect = previewCanvasEl.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (previewCanvasEl.width / rect.width),
    y: (e.clientY - rect.top) * (previewCanvasEl.height / rect.height)
  };
}
function inPhotoRect(pt) {
  const r = getPhotoRect();
  return pt.x >= r.x && pt.x <= r.x + r.w && pt.y >= r.y && pt.y <= r.y + r.h;
}

previewCanvasEl.addEventListener('pointerdown', e => {
  if (!photoDataUrl || !inPhotoRect(canvasPoint(e))) return;
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY, offX: photoT.offsetX, offY: photoT.offsetY };
  previewCanvasEl.setPointerCapture(e.pointerId);
  previewCanvasEl.style.cursor = 'grabbing';
});
previewCanvasEl.addEventListener('pointermove', e => {
  if (dragging) {
    const rect = previewCanvasEl.getBoundingClientRect();
    const scale = previewCanvasEl.width / rect.width;
    photoT.offsetX = dragStart.offX + (e.clientX - dragStart.x) * scale;
    photoT.offsetY = dragStart.offY + (e.clientY - dragStart.y) * scale;
    clampPhotoOffset();
    renderPreview();
  } else {
    previewCanvasEl.style.cursor = (photoDataUrl && inPhotoRect(canvasPoint(e))) ? 'grab' : 'default';
  }
});
previewCanvasEl.addEventListener('pointerup', e => {
  dragging = false;
  previewCanvasEl.releasePointerCapture(e.pointerId);
});

['firstName','lastName','jobTitle','company'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    document.getElementById(id).classList.remove('error');
    renderPreview();
  });
});

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// Greedy word-wrap. Returns all wrapped lines; caller may cap the count.
function wrapText(ctx, text, maxWidth, maxLines) {
  const words = (text || '').split(/\s+/).filter(Boolean);
  if (!words.length) return [''];
  const lines = [];
  let cur = words[0];
  for (let i = 1; i < words.length; i++) {
    const test = cur + ' ' + words[i];
    if (ctx.measureText(test).width <= maxWidth) {
      cur = test;
    } else {
      lines.push(cur);
      cur = words[i];
    }
  }
  lines.push(cur);
  return maxLines ? lines.slice(0, maxLines) : lines;
}

function fitFont(ctx, text, family, weight, style, startSize, minSize, maxWidth) {
  let size = startSize;
  ctx.font = `${style} ${weight} ${size}px '${family}'`;
  while (ctx.measureText(text).width > maxWidth && size > minSize) {
    size -= 2;
    ctx.font = `${style} ${weight} ${size}px '${family}'`;
  }
  return size;
}

// Wraps text to fit maxLines, shrinking the font if it would otherwise overflow.
function wrapAndFit(ctx, text, family, weight, style, startSize, minSize, maxWidth, maxLines) {
  let size = startSize, lines;
  for (; size > minSize; size -= 2) {
    ctx.font = `${style} ${weight} ${size}px '${family}'`;
    lines = wrapText(ctx, text, maxWidth);
    if (lines.length <= maxLines) return { size, lines };
  }
  ctx.font = `${style} ${weight} ${size}px '${family}'`;
  return { size, lines: wrapText(ctx, text, maxWidth, maxLines) };
}

async function drawPoster(canvas, fn, ln, jt, co, photoSrc) {
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;
  ctx.clearRect(0,0,W,H);

  // ── BACKGROUND ──
  if (bgImg) {
    const ia = bgImg.width/bgImg.height, ba = W/H;
    let dw,dh,dx,dy;
    if (ia > ba) { dh=H; dw=dh*ia; dx=(W-dw)/2; dy=0; }
    else         { dw=W; dh=dw/ia; dx=0; dy=(H-dh)/2; }
    ctx.drawImage(bgImg, dx, dy, dw, dh);
  } else { ctx.fillStyle='#3a5068'; ctx.fillRect(0,0,W,H); }

  const M = 30;
  const CW = W - M*2;

  // ── HEADER ──
  const pillPad = 41, pillH = 198, pillY = M, pillX = M, pillW = CW, pillR = 16;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.15)'; ctx.shadowBlur = 24; ctx.shadowOffsetY = 6;
  rr(ctx, pillX, pillY, pillW, pillH, pillR); ctx.fillStyle = '#fff'; ctx.fill();
  ctx.restore();

  const pillInnerW = pillW - pillPad*2;
  const pillCenterY = pillY + pillH/2;

  ctx.font = "italic 400 67px 'Playfair Display'";
  const headline = "I'm Attending";
  const headlineW = ctx.measureText(headline).width;
  const spW = 76, spH = sparkleImg ? spW * (sparkleImg.height/sparkleImg.width) : 0;
  const logoH = 117, logoW = logoImg ? logoH * (logoImg.width/logoImg.height) : 296;
  const flexGap = Math.max(24, (pillInnerW - headlineW - spW - logoW) / 2);

  const headlineX = pillX + pillPad;
  const sparkleX = headlineX + headlineW + flexGap;
  const logoX = pillX + pillPad + pillInnerW - logoW;

  ctx.save();
  ctx.fillStyle = '#111';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.fillText(headline, headlineX, pillCenterY);
  ctx.restore();

  if (sparkleImg) ctx.drawImage(sparkleImg, sparkleX, pillCenterY - spH/2, spW, spH);
  if (logoImg) ctx.drawImage(logoImg, logoX, pillCenterY - logoH/2, logoW, logoH);

  const row2Y = pillY + pillH + 40, row2H = 73;

  // Location + date — left
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.font = "400 28px 'Barlow'";
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('Pan Pacific London, UK', M, row2Y + 28);
  ctx.fillText('September 10, 2026', M, row2Y + 28 + 34);
  ctx.restore();

  // Tagline — right, 2 lines
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.font = "400 28px 'Barlow'";
  ctx.textAlign = 'right';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText("The world's #1 event for", M + CW, row2Y + 28);
  ctx.fillText('delivery professionals', M + CW, row2Y + 28 + 34);
  ctx.restore();

  // ── CONTENT ROW ──
  const headerBlockH = pillH + 40 + row2H;
  const gapMain = 81;
  const contentY = M + headerBlockH + gapMain;
  const contentH = H - M - contentY;
  const colGap = 24;
  const leftColW = 484;
  const rightColW = CW - leftColW - colGap;
  const leftColX = M;
  const rightColX = M + leftColW + colGap;

  // Photo box
  const btnH = 84;
  const photoW = leftColW, photoH = contentH - btnH - colGap;
  const photoX = leftColX, photoY = contentY;

  ctx.save();
  rr(ctx, photoX, photoY, photoW, photoH, 24);
  ctx.clip();
  if (photoSrc) {
    const img = photoImgEl || await loadImg(photoSrc);
    if (img) {
      const ia = img.width/img.height, ba = photoW/photoH;
      let baseW,baseH;
      if (ia > ba) { baseH=photoH; baseW=baseH*ia; }
      else         { baseW=photoW; baseH=baseW/ia; }
      const dw = baseW*photoT.zoom, dh = baseH*photoT.zoom;
      const dx = photoX + (photoW-dw)/2 + photoT.offsetX;
      const dy = photoY + (photoH-dh)/2 + photoT.offsetY;
      ctx.filter = `brightness(${photoT.brightness}%) contrast(${photoT.contrast}%)`;
      ctx.drawImage(img, dx, dy, dw, dh);
      ctx.filter = 'none';
    }
  } else {
    const pg = ctx.createLinearGradient(photoX, photoY, photoX+photoW*0.6, photoY+photoH);
    pg.addColorStop(0,   '#7dffc4');
    pg.addColorStop(0.5, '#c8ffe8');
    pg.addColorStop(1,   '#edfff8');
    ctx.fillStyle = pg; ctx.fillRect(photoX, photoY, photoW, photoH);
    ctx.fillStyle = 'rgba(0,180,110,0.18)';
    ctx.font = '140px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('👤', photoX+photoW/2, photoY+photoH/2+8);
  }
  ctx.restore();

  // Join PropelX button
  const btnX = leftColX, btnY = contentY + photoH + colGap, btnW = leftColW;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.18)'; ctx.shadowBlur = 20; ctx.shadowOffsetY = 4;
  rr(ctx, btnX, btnY, btnW, btnH, 24); ctx.fillStyle = '#fff'; ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.font = "600 28px 'Barlow'";
  ctx.fillStyle = '#333'; ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.fillText('Join PropelX', btnX + 34, btnY + btnH/2 + 1);
  const circR = 28, circCx = btnX + btnW - 12 - circR, circCy = btnY + btnH/2;
  ctx.fillStyle = '#00FF91';
  ctx.beginPath(); ctx.arc(circCx, circCy, circR, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#0d1f14'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(circCx-9, circCy); ctx.lineTo(circCx+9, circCy);
  ctx.moveTo(circCx+2, circCy-7); ctx.lineTo(circCx+9, circCy); ctx.lineTo(circCx+2, circCy+7);
  ctx.stroke();
  ctx.restore();

  // ── GLASS CARD (right column) ──
  const cardX = rightColX, cardY = contentY, cardW = rightColW, cardH = contentH;
  ctx.save();
  rr(ctx, cardX, cardY, cardW, cardH, 24);
  ctx.clip();
  // frosted background: blurred copy of the poster background, then a dark tint
  if (bgImg) {
    ctx.save();
    ctx.filter = 'blur(48px)';
    const ia = bgImg.width/bgImg.height, ba = W/H;
    let dw,dh,dx,dy;
    if (ia > ba) { dh=H*1.1; dw=dh*ia; dx=(W-dw)/2; dy=-H*0.05; }
    else         { dw=W*1.1; dh=dw/ia; dx=-W*0.05; dy=(H-dh)/2; }
    ctx.drawImage(bgImg, dx, dy, dw, dh);
    ctx.restore();
  } else {
    ctx.fillStyle = '#4a5a55'; ctx.fillRect(cardX, cardY, cardW, cardH);
  }
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(cardX, cardY, cardW, cardH);
  ctx.restore();

  // Card content
  const pad = 24;
  const innerX = cardX + pad, innerW = cardW - pad*2;
  const innerY = cardY + pad, innerH = cardH - pad*2;

  ctx.save();
  rr(ctx, cardX, cardY, cardW, cardH, 24);
  ctx.clip();

  // Name block — Playfair Display, regular italic
  const dispFn = fn || 'First Name', dispLn = ln || 'Last Name';
  const nameSize = 53, nameLineH = 66;
  ctx.fillStyle = '#fff'; ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
  let fs = fitFont(ctx, dispFn, 'Playfair Display', 400, 'italic', nameSize, 30, innerW);
  ctx.font = `italic 400 ${fs}px 'Playfair Display'`;
  ctx.fillText(dispFn, innerX, innerY + fs);
  let ls = fitFont(ctx, dispLn, 'Playfair Display', 400, 'italic', nameSize, 30, innerW);
  ctx.font = `italic 400 ${ls}px 'Playfair Display'`;
  ctx.fillText(dispLn, innerX, innerY + nameLineH + ls);
  const nameBlockH = nameLineH * 2;

  // Job title (wraps up to 3 lines) + Company (wraps up to 2 lines)
  const dispJt = jt || 'Job Title', dispCo = co || 'Company Name';
  const titleSize = 31, companySize = 35, companyGap = 12;
  const jtFit = wrapAndFit(ctx, dispJt, 'Barlow', 400, 'normal', titleSize, 20, innerW, 3);
  const coFit = wrapAndFit(ctx, dispCo, 'Barlow', 400, 'normal', companySize, 20, innerW, 2);
  const titleLineH = Math.round(jtFit.size * 1.22);
  const companyLineH = Math.round(coFit.size * 1.2);
  const titleBlockH = jtFit.lines.length * titleLineH + companyGap + coFit.lines.length * companyLineH;

  // QR block
  const qrSize = 135, qrGap = 30;
  ctx.font = `italic 400 24px 'Barlow'`;
  const captionLines = ['Ready to Join?', 'Scan the QR Code'];
  const qrBlockH = qrSize;

  const gap = Math.max(24, (innerH - nameBlockH - titleBlockH - qrBlockH) / 2);

  // draw job title lines
  let ty = innerY + nameBlockH + gap;
  ctx.save();
  ctx.fillStyle = '#fff'; ctx.font = `400 ${jtFit.size}px 'Barlow'`;
  jtFit.lines.forEach(line => { ctx.fillText(line, innerX, ty + jtFit.size); ty += titleLineH; });
  ty += companyGap;
  // company — same weight as job title/QR caption, wraps up to 2 lines
  ctx.font = `400 ${coFit.size}px 'Barlow'`;
  coFit.lines.forEach(line => { ctx.fillText(line, innerX, ty + coFit.size); ty += companyLineH; });
  ctx.restore();

  // QR + caption row, bottom aligned
  const qrY = cardY + cardH - pad - qrSize;
  if (qrImg) {
    rr(ctx, innerX, qrY, qrSize, qrSize, 10);
    ctx.fillStyle = '#fff'; ctx.fill();
    // quiet-zone margin inside the white box, and no smoothing so the QR
    // modules stay crisp (bilinear-blurring a QR can make it unscannable)
    const qrPad = 10;
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(qrImg, innerX + qrPad, qrY + qrPad, qrSize - qrPad*2, qrSize - qrPad*2);
    ctx.restore();
  }
  ctx.save();
  ctx.fillStyle = '#fff'; ctx.font = `italic 400 24px 'Barlow'`;
  const capX = innerX + qrSize + qrGap;
  let capY = qrY + qrSize/2 - (captionLines.length-1)*14;
  captionLines.forEach(line => { ctx.fillText(line, capX, capY); capY += 29; });
  ctx.restore();

  ctx.restore(); // card clip
}

async function renderPreview() {
  const fn=document.getElementById('firstName').value.trim();
  const ln=document.getElementById('lastName').value.trim();
  const jt=document.getElementById('jobTitle').value.trim();
  const co=document.getElementById('company').value.trim();
  await drawPoster(document.getElementById('previewCanvas'),fn,ln,jt,co,photoDataUrl);
}

document.getElementById('genBtn').addEventListener('click', async function() {
  const fn=document.getElementById('firstName').value.trim();
  const ln=document.getElementById('lastName').value.trim();
  const jt=document.getElementById('jobTitle').value.trim();
  const co=document.getElementById('company').value.trim();
  let ok=true;
  [['firstName',fn],['lastName',ln],['jobTitle',jt],['company',co]].forEach(([id,val])=>{
    const el=document.getElementById(id);
    if(!val){el.classList.add('error');ok=false;} else el.classList.remove('error');
  });
  if(!ok) return;
  this.textContent='Generating…'; this.disabled=true;
  try {
    const c=document.getElementById('posterCanvas');
    await drawPoster(c,fn,ln,jt,co,photoDataUrl);
    const a=document.createElement('a');
    a.download=`propelx-speaker-${fn.toLowerCase()}-${ln.toLowerCase()}.png`;
    a.href=c.toDataURL('image/png'); a.click();
    const t=document.getElementById('toast');
    t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),4000);
  } finally {
    this.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Generate &amp; Download`;
    this.disabled=false;
  }
});
